version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: co_wildfire
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d co_wildfire"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: CoWildfireApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=co_wildfire;
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Qdrant__Host: qdrant
      Qdrant__Port: 6334
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      Firms__MapKey: ${FIRMS_MAP_KEY}
      AirNow__ApiKey: ${AIRNOW_API_KEY}
      MesoWest__Token: ${MESOWEST_TOKEN}
      Cors__AllowedOrigins__0: http://localhost
      Cors__AllowedOrigins__1: ${APP_PUBLIC_URL:-http://localhost}
      Ingestion__MtbsShapefilePath: /data/mtbs/mtbs_perims_DD.shp
    volumes:
      - ./backend/data/mtbs:/data/mtbs:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
